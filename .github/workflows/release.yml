name: Release

# Builds release binaries for every supported platform and attaches them to the
# GitHub Release whenever a version tag (e.g. v0.2.0) is pushed.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: aarch64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          name="typebar-${version}-${{ matrix.target }}"
          mkdir -p "staging/${name}"
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/typebar.exe" "staging/${name}/"
          else
            cp "target/${{ matrix.target }}/release/typebar" "staging/${name}/"
          fi
          cp README.md LICENSE-MIT LICENSE-APACHE "staging/${name}/"
          cd staging
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a "${name}.zip" "${name}" >/dev/null
            archive="${name}.zip"
          else
            tar czf "${name}.tar.gz" "${name}"
            archive="${name}.tar.gz"
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${archive}" > "${archive}.sha256"
          else
            shasum -a 256 "${archive}" > "${archive}.sha256"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: typebar-${{ matrix.target }}
          path: |
            staging/*.tar.gz
            staging/*.zip
            staging/*.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true
