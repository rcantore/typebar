<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>typebar</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Barra superior minima: acciones de archivo y estado del documento. -->
    <header class="toolbar">
      <span class="brand">typebar</span>
      <div class="actions">
        <button id="btn-open" type="button">Open</button>
        <button id="btn-save" type="button">Save</button>
        <button id="btn-save-as" type="button">Save as</button>
      </div>
      <span id="doc-path" class="doc-path">documento sin guardar</span>
    </header>

    <!-- Regla separadora entre la barra y la zona de escritura, como en la TUI. -->
    <div class="rule"></div>

    <!-- Editor WYSIWYG por bloques: una sola columna centrada sobre el papel.
         Cada bloque se ve renderizado; el que tiene el foco se swapea por su
         source markdown crudo. Es el "Nivel 2" de la TUI (linea activa cruda,
         resto renderizado) subido de linea a bloque. -->
    <main class="page">
      <div id="doc" class="doc"></div>
    </main>

    <script src="main.js"></script>
  </body>
</html>
